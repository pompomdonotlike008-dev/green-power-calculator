<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>解锁码生成 - 王炸小纸条</title>
<style>
*{font-family:-apple-system,'PingFang SC',sans-serif;box-sizing:border-box}
body{background:#f5f5f7;margin:0;padding:16px;display:flex;min-height:100vh;align-items:center;justify-content:center}
.card{background:#fff;border-radius:20px;padding:32px;max-width:360px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center}
input{width:100%;padding:14px 16px;border:1.5px solid #e5e5ea;border-radius:12px;font-size:16px;outline:none;box-sizing:border-box;text-align:center;margin:8px 0}
input:focus{border-color:#007AFF}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin:4px 0}
.btn-green{background:#34C759;color:#fff}
.btn-red{background:#ff3b30;color:#fff}
.code{font-size:32px;font-weight:800;letter-spacing:6px;color:#007AFF;margin:16px 0;padding:20px;background:#f0f7ff;border-radius:12px}
.hidden{display:none}
.step{display:block}
.step.hidden{display:none}
.hint{font-size:12px;color:#86868b;margin-top:8px}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:48px">🔑</div>
  <h2 style="font-size:20px;font-weight:700;color:#1a1a1a;margin:8px 0">解锁码生成</h2>
  <p style="font-size:13px;color:#86868b;margin-bottom:16px">有人付款后，生成解锁码发给他</p>

  <div id="s1" class="step">
    <input type="password" id="pwd" placeholder="管理员密码" maxlength="20">
    <button class="btn btn-green" onclick="login()">登录</button>
    <p class="hint">首次使用请先设置密码</p>
  </div>

  <div id="s2" class="step hidden">
    <div class="code" id="codeDisplay">------</div>
    <button class="btn btn-green" onclick="genCode()" style="padding:18px;font-size:18px">⚡ 生成解锁码</button>
    <p class="hint">生成6位数字解锁码，发给用户即可</p>
    <p style="font-size:11px;color:#bbb;margin-top:12px;cursor:pointer" onclick="logout()">切换账号</p>
  </div>
</div>

<script>
function login() {
  var p = document.getElementById('pwd').value;
  var saved = localStorage.getItem('admin_pwd_hash');
  if (!saved) {
    if (p.length < 4) { alert('密码至少4位'); return; }
    localStorage.setItem('admin_pwd_hash', btoa(p));
    show(2); return;
  }
  if (btoa(p) === saved) { show(2); }
  else { alert('密码错误'); }
}

function genCode() {
  var c = '';
  for (var i = 0; i < 6; i++) c += Math.floor(Math.random() * 10);
  var sum = parseInt(c[0])+parseInt(c[1])+parseInt(c[2])+parseInt(c[3])+parseInt(c[4])+parseInt(c[5]);
  if (sum % 3 !== 0) return genCode();
  document.getElementById('codeDisplay').textContent = c;
}

function show(n) {
  document.querySelectorAll('.step').forEach(function(s){ s.classList.add('hidden'); });
  document.getElementById('s' + n).classList.remove('hidden');
}

function logout() {
  if (confirm('清除密码？')) { localStorage.removeItem('admin_pwd_hash'); show(1); }
}

if (localStorage.getItem('admin_pwd_hash')) show(2);
</script>
</body>
</html>
