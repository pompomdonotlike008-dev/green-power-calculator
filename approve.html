<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>解锁码生成 - 王炸小纸条</title>
<style>
*{font-family:-apple-system,'PingFang SC',sans-serif;box-sizing:border-box}
body{background:#f5f5f7;margin:0;padding:16px;display:flex;min-height:100vh;align-items:center;justify-content:center}
.card{background:#fff;border-radius:20px;padding:32px;max-width:360px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center}
input{width:100%;padding:14px 16px;border:1.5px solid #e5e5ea;border-radius:12px;font-size:16px;outline:none;box-sizing:border-box;text-align:center;margin:8px 0}
input:focus{border-color:#007AFF}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin:4px 0}
.btn-green{background:#34C759;color:#fff}
.btn-blue{background:#007AFF;color:#fff}
.code{font-size:40px;font-weight:800;letter-spacing:8px;color:#007AFF;margin:16px 0;padding:24px;background:#f0f7ff;border-radius:12px}
.hidden{display:none}
.hint{font-size:12px;color:#86868b;margin-top:8px}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:48px">🔑</div>
  <h2 style="font-size:20px;font-weight:700;color:#1a1a1a;margin:8px 0">解锁码生成</h2>
  <p style="font-size:13px;color:#86868b;margin-bottom:16px">有人付了20元，就帮他生成一个解锁码</p>

  <div class="step" id="s1">
    <input type="password" id="pwd" placeholder="设置管理员密码" maxlength="20">
    <button class="btn btn-green" onclick="login()">进入</button>
    <p class="hint">首次输入任意密码即可设置</p>
  </div>

  <div class="step hidden" id="s2">
    <div class="code" id="display">------</div>
    <button class="btn btn-green" onclick="gen()">⚡ 生成解锁码</button>
    <p class="hint">把6位数字发给用户，他在计算器输入即可解锁</p>
    <hr style="border:none;border-top:1px solid #eee;margin:16px 0">
    <p style="font-size:13px;color:#1a1a1a;font-weight:600;margin:0 0 8px">检查已生成的解锁码</p>
    <div id="history" style="font-size:12px;color:#86868b"></div>
  </div>
</div>
<script>
function login() {
  var p = document.getElementById('pwd').value;
  var saved = localStorage.getItem('admin_pw');
  if (!saved) {
    if (p.length < 4) { alert('密码至少4位'); return; }
    localStorage.setItem('admin_pw', p);
    go(2); return;
  }
  if (p === saved) { go(2); }
  else { alert('密码错误'); }
}
function go(n) {
  document.querySelectorAll('.step').forEach(function(s){ s.classList.add('hidden'); });
  document.getElementById('s'+n).classList.remove('hidden');
  if (n === 2) showHistory();
}
function gen() {
  var c = '';
  for (var i=0;i<6;i++) c += Math.floor(Math.random()*10);
  var s = parseInt(c[0])+parseInt(c[1])+parseInt(c[2])+parseInt(c[3])+parseInt(c[4])+parseInt(c[5]);
  if (s%3!==0) return gen();
  document.getElementById('display').textContent = c;
  // Save history
  var h = JSON.parse(localStorage.getItem('codes') || '[]');
  h.unshift({code:c, time:new Date().toLocaleString()});
  if (h.length > 20) h.pop();
  localStorage.setItem('codes', JSON.stringify(h));
  showHistory();
}
function showHistory() {
  var h = JSON.parse(localStorage.getItem('codes') || '[]');
  document.getElementById('history').innerHTML = h.length ? h.map(function(i){ return '<div style="padding:4px 0"><b>'+i.code+'</b> <span style="color:#999">'+i.time+'</span></div>'; }).join('') : '暂无记录';
}
if (localStorage.getItem('admin_pw')) { go(2); }
</script>
</body>
</html>
