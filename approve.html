<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>解锁码</title>
<style>
*{font-family:-apple-system,'PingFang SC',sans-serif}
body{background:#f5f5f7;margin:0;padding:20px;display:flex;min-height:100vh;align-items:center;justify-content:center}
.card{background:#fff;border-radius:24px;padding:32px;max-width:360px;width:100%;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center}
.code{font-size:44px;font-weight:800;letter-spacing:8px;color:#007AFF;padding:24px;background:#f0f7ff;border-radius:16px;margin:16px 0}
.btn{background:#007AFF;color:#fff;border:none;border-radius:14px;padding:16px;font-size:18px;font-weight:600;cursor:pointer;width:100%}
.hint{font-size:13px;color:#86868b;margin:12px 0}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:48px">🔑</div>
  <h2 style="font-size:20px;font-weight:700;color:#1a1a1a;margin:8px 0">生成解锁码</h2>
  <p class="hint">点按钮生成，发给用户即可</p>
  <div class="code" id="code">------</div>
  <button class="btn" onclick="gen()">⚡ 生成新码</button>
  <div id="history" style="margin-top:16px;font-size:12px;color:#999;text-align:left"></div>
</div>
<script>
function gen() {
  var c = '';
  for (var i=0;i<6;i++) c += Math.floor(Math.random()*10);
  var s = 0; for (var i=0;i<6;i++) s += parseInt(c[i]);
  if (s % 3 !== 0) return gen();
  document.getElementById('code').textContent = c;
  var h = JSON.parse(localStorage.getItem('h') || '[]');
  h.unshift({c:c, t:new Date().toLocaleTimeString()});
  if (h.length > 10) h.pop();
  localStorage.setItem('h', JSON.stringify(h));
  showHistory();
}
function showHistory() {
  var h = JSON.parse(localStorage.getItem('h') || '[]');
  document.getElementById('history').innerHTML = h.length ? '最近：' + h.map(function(i){ return '<b>'+i.c+'</b>('+i.t+')' }).join(' ') : '';
}
showHistory();
</script>
</body>
</html>
